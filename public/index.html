<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Login | Black Grapes Softech</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .demo-accounts {
            background: var(--bg-card-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-top: 16px;
        }
        .demo-accounts h4 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
        .demo-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .demo-row span { font-size: 0.78rem; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary); }
        .demo-row .demo-fill { font-size: 0.7rem; color: var(--accent); cursor: pointer; }
        .demo-row .demo-fill:hover { text-decoration: underline; }

        .auth-card form { display: none; }
        .auth-card form.active { display: block; }

        .role-select-wrap {
            display: flex;
            gap: 8px;
        }
        .role-opt {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all var(--t);
        }
        .role-opt.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }
        .company-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="auth-logo-icon">⊞</div>
            <div class="company-badge">🏢 Black Grapes Softech, Indore</div>
            <h1>TaskFlow</h1>
            <p>Project & Task Management Platform</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <form class="active" id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px" id="login-btn">
                    Sign In
                </button>

                <div class="demo-accounts">
                    <h4>Demo Accounts</h4>
                    <div class="demo-row">
                        <span>admin@bgsoft.com</span>
                        <span class="demo-fill" onclick="fillDemo('admin@bgsoft.com','admin123')">Use →</span>
                    </div>
                    <div class="demo-row">
                        <span>riya@bgsoft.com (Manager)</span>
                        <span class="demo-fill" onclick="fillDemo('riya@bgsoft.com','manager123')">Use →</span>
                    </div>
                    <div class="demo-row">
                        <span>arjun@bgsoft.com (Dev)</span>
                        <span class="demo-fill" onclick="fillDemo('arjun@bgsoft.com','dev123')">Use →</span>
                    </div>
                </div>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <div class="role-select-wrap" id="role-opts">
                        <div class="role-opt selected" data-role="member">Member</div>
                        <div class="role-opt" data-role="manager">Manager</div>
                    </div>
                    <input type="hidden" id="reg-role" value="member">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px" id="reg-btn">
                    Create Account
                </button>
            </form>
        </div>

        <p style="text-align:center;margin-top:16px;font-size:0.78rem;color:var(--text-muted)">
            Final Year Project — MCA 2026 | Black Grapes Softech
        </p>
    </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t,i) => {
            t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
        document.getElementById('login-form').classList.toggle('active', tab === 'login');
        document.getElementById('register-form').classList.toggle('active', tab === 'register');
    }

    function fillDemo(email, pw) {
        document.getElementById('login-email').value = email;
        document.getElementById('login-password').value = pw;
    }

    // Role selection
    document.querySelectorAll('.role-opt').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.role-opt').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            document.getElementById('reg-role').value = opt.dataset.role;
        });
    });

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        btn.textContent = 'Signing in…';
        btn.disabled = true;
        try {
            const data = await POST('/auth/login', {
                email:    document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            });
            Auth.set(data.token, data.user);
            toast('Welcome back!', `Hello, ${data.user.name}`, 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 600);
        } catch (err) {
            toast('Login failed', err.message, 'error');
            btn.textContent = 'Sign In';
            btn.disabled = false;
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');
        btn.textContent = 'Creating account…';
        btn.disabled = true;
        try {
            const data = await POST('/auth/register', {
                name:     document.getElementById('reg-name').value,
                email:    document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                role:     document.getElementById('reg-role').value
            });
            Auth.set(data.token, data.user);
            toast('Account created!', `Welcome, ${data.user.name}`, 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 600);
        } catch (err) {
            toast('Registration failed', err.message, 'error');
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
