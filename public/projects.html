<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — TaskFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            transition: transform var(--t), border-color var(--t), box-shadow var(--t);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .project-card:hover {
            transform: translateY(-3px);
            border-color: var(--text-muted);
            box-shadow: var(--shadow);
        }
        .project-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
        .project-card-title { font-size: 0.95rem; font-weight: 700; line-height: 1.4; flex: 1; }
        .project-card-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .project-card-meta { display: flex; align-items: center; justify-content: space-between; }
        .project-card-dates { font-size: 0.72rem; color: var(--text-muted); display: flex; gap: 10px; }
        .project-card-members { display: flex; }
        .project-card-members .avatar {
            margin-left: -6px;
            border: 2px solid var(--bg-card);
            width: 26px; height: 26px;
            font-size: 0.62rem;
        }
        .project-card-members .avatar:first-child { margin-left: 0; }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--t);
        }
        .filter-chip:hover, .filter-chip.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
    </style>
</head>
<body>
<div id="toast-container"></div>

<div class="app-shell">
    <div id="sidebar-wrap"></div>

    <header class="topbar">
        <span class="topbar-title">Projects</span>
        <div class="topbar-actions">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" class="form-control" id="search-input" placeholder="Search projects…" style="width:220px">
            </div>
            <button class="btn btn-primary btn-sm" onclick="openModal('create-project-modal')">+ New Project</button>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <div class="page-header-left">
                <h1>All Projects</h1>
                <p>Manage and track your organization's projects</p>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="active">Active</button>
            <button class="filter-chip" data-filter="on-hold">On Hold</button>
            <button class="filter-chip" data-filter="completed">Completed</button>
            <button class="filter-chip" data-filter="cancelled">Cancelled</button>
        </div>

        <div class="project-grid" id="projects-grid">
            <div class="skeleton" style="height:200px;border-radius:12px"></div>
            <div class="skeleton" style="height:200px;border-radius:12px"></div>
            <div class="skeleton" style="height:200px;border-radius:12px"></div>
        </div>
    </main>
</div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="create-project-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Create New Project</span>
            <button class="modal-close" onclick="closeModal('create-project-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Project Title *</label>
                <input type="text" class="form-control" id="p-title" placeholder="e.g. E-Commerce Platform">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="p-desc" placeholder="Brief project description…" rows="3"></textarea>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-control" id="p-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Start Date</label>
                    <input type="date" class="form-control" id="p-start">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control" id="p-end">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('create-project-modal')">Cancel</button>
            <button class="btn btn-primary" id="create-project-btn" onclick="createProject()">Create Project</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
Auth.requireAuth();
document.getElementById('sidebar-wrap').innerHTML = renderSidebar('projects');
document.getElementById('user-card-btn')?.addEventListener('click', () => { Auth.clear(); window.location.href='index.html'; });

let allProjects = [];
let activeFilter = 'all';

async function loadProjects() {
    try {
        allProjects = await GET('/projects');
        renderProjects();
    } catch (err) {
        toast('Error', 'Failed to load projects', 'error');
    }
}

function renderProjects() {
    const search = document.getElementById('search-input').value.toLowerCase();
    let filtered = allProjects;
    if (activeFilter !== 'all') filtered = filtered.filter(p => p.status === activeFilter);
    if (search) filtered = filtered.filter(p => p.title.toLowerCase().includes(search) || (p.description||'').toLowerCase().includes(search));

    const grid = document.getElementById('projects-grid');

    if (!filtered.length) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;padding:60px">
                <div class="empty-icon">◈</div>
                <div class="empty-title">No projects found</div>
                <div class="empty-desc">Create your first project to get started.</div>
                <button class="btn btn-primary mt-16" onclick="openModal('create-project-modal')">+ New Project</button>
            </div>`;
        return;
    }

    grid.innerHTML = filtered.map(p => {
        const pct = calcProgress(p.done_count, p.task_count);
        const msProgress = calcProgress(p.milestone_done, p.milestone_count);
        return `
            <div class="project-card" onclick="window.location='project-detail.html?id=${p.id}'">
                <div class="project-card-header">
                    <div class="project-card-title">${p.title}</div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                        ${statusBadge(p.status)}
                        ${priorityBadge(p.priority)}
                    </div>
                </div>
                ${p.description ? `<div class="project-card-desc">${p.description}</div>` : ''}
                <div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
                        <span class="text-xs text-muted">Task Progress</span>
                        <span class="text-xs" style="font-family:'JetBrains Mono',monospace">${p.done_count}/${p.task_count}</span>
                    </div>
                    ${progressBar(pct)}
                </div>
                <div class="project-card-meta">
                    <div class="project-card-dates">
                        <span>📅 ${formatDate(p.start_date)}</span>
                        ${p.end_date ? `<span>→ ${formatDate(p.end_date)}</span>` : ''}
                    </div>
                    <div style="display:flex;align-items:center;gap:6px">
                        <span class="text-xs text-muted">${p.milestone_done}/${p.milestone_count} milestones</span>
                    </div>
                </div>
                <div style="font-size:0.72rem;color:var(--text-muted)">Owner: ${p.owner_name}</div>
            </div>
        `;
    }).join('');
}

// Filter chips
document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderProjects();
    });
});

document.getElementById('search-input').addEventListener('input', renderProjects);

async function createProject() {
    const title = document.getElementById('p-title').value.trim();
    if (!title) { toast('Validation', 'Project title is required', 'warning'); return; }

    const btn = document.getElementById('create-project-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
        await POST('/projects', {
            title,
            description: document.getElementById('p-desc').value,
            priority:    document.getElementById('p-priority').value,
            start_date:  document.getElementById('p-start').value,
            end_date:    document.getElementById('p-end').value
        });
        closeModal('create-project-modal');
        toast('Success', `Project "${title}" created!`, 'success');
        document.getElementById('p-title').value = '';
        document.getElementById('p-desc').value = '';
        await loadProjects();
    } catch (err) {
        toast('Error', err.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Create Project';
    }
}

loadProjects();
</script>
</body>
</html>
