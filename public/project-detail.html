<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail — TaskFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .project-hero {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }
        .project-hero-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .project-hero-desc {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.7;
            max-width: 700px;
        }
        .project-hero-meta {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .meta-item { display: flex; flex-direction: column; gap: 2px; }
        .meta-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
        .meta-value { font-size: 0.85rem; font-weight: 600; }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .tab-btn {
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all var(--t);
            cursor: pointer;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .member-item:last-child { border-bottom: none; }
        .member-role-badge {
            margin-left: auto;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--bg-card-2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
<div id="toast-container"></div>

<div class="app-shell">
    <div id="sidebar-wrap"></div>

    <header class="topbar">
        <a href="projects.html" style="color:var(--text-muted);font-size:0.85rem">← Projects</a>
        <span style="color:var(--text-muted);margin:0 6px">/</span>
        <span class="topbar-title" id="topbar-project-name">Loading…</span>
        <div class="topbar-actions">
            <button class="btn btn-secondary btn-sm" onclick="openEditProjectModal()">Edit Project</button>
            <button class="btn btn-primary btn-sm" onclick="openModal('create-task-modal')">+ Add Task</button>
        </div>
    </header>

    <main class="main-content">
        <!-- Project Hero -->
        <div class="project-hero" id="project-hero">
            <div class="skeleton" style="height:120px;border-radius:8px"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('milestones')">Milestones</button>
            <button class="tab-btn" onclick="switchTab('tasks')">Tasks</button>
            <button class="tab-btn" onclick="switchTab('members')">Team Members</button>
            <button class="tab-btn" onclick="switchTab('overview')">Overview</button>
        </div>

        <!-- Milestones Tab -->
        <div class="tab-panel active" id="tab-milestones">
            <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
                <button class="btn btn-secondary btn-sm" onclick="openModal('create-milestone-modal')">+ Add Milestone</button>
            </div>
            <div class="card">
                <div class="milestone-list" id="milestone-list">
                    <div class="skeleton" style="height:80px;margin-bottom:12px;border-radius:8px"></div>
                    <div class="skeleton" style="height:80px;border-radius:8px"></div>
                </div>
            </div>
        </div>

        <!-- Tasks Tab -->
        <div class="tab-panel" id="tab-tasks">
            <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
                <select class="form-control" id="task-status-filter" style="width:140px" onchange="renderTasksTable()">
                    <option value="">All Statuses</option>
                    <option value="todo">To Do</option>
                    <option value="in-progress">In Progress</option>
                    <option value="review">Review</option>
                    <option value="done">Done</option>
                </select>
                <select class="form-control" id="task-priority-filter" style="width:140px" onchange="renderTasksTable()">
                    <option value="">All Priorities</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
                <div class="search-wrap" style="flex:1;min-width:200px">
                    <span class="search-icon">⌕</span>
                    <input type="text" class="form-control" id="task-search" placeholder="Search tasks…" oninput="renderTasksTable()">
                </div>
            </div>
            <div class="card" style="padding:0">
                <div class="table-wrap">
                    <table id="tasks-table">
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Milestone</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Assigned To</th>
                                <th>Due Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Members Tab -->
        <div class="tab-panel" id="tab-members">
            <div class="card" style="max-width:600px">
                <div class="card-header">
                    <span class="card-title">Team Members</span>
                </div>
                <div id="members-list">
                    <div class="skeleton" style="height:50px;margin-bottom:8px;border-radius:8px"></div>
                </div>
            </div>
        </div>

        <!-- Overview Tab -->
        <div class="tab-panel" id="tab-overview">
            <div class="grid-2">
                <div class="card">
                    <div class="card-header"><span class="card-title">Task Status Breakdown</span></div>
                    <div id="overview-status"></div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">Milestone Summary</span></div>
                    <div id="overview-milestones"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Create Milestone Modal -->
<div class="modal-overlay" id="create-milestone-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Add Milestone</span>
            <button class="modal-close" onclick="closeModal('create-milestone-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Title *</label><input type="text" class="form-control" id="ms-title" placeholder="e.g. Frontend Complete"></div>
            <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="ms-desc" rows="3" placeholder="What does completing this milestone mean?"></textarea></div>
            <div class="form-group"><label class="form-label">Due Date</label><input type="date" class="form-control" id="ms-due"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('create-milestone-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="createMilestone()">Add Milestone</button>
        </div>
    </div>
</div>

<!-- Create Task Modal -->
<div class="modal-overlay" id="create-task-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Add Task</span>
            <button class="modal-close" onclick="closeModal('create-task-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Task Title *</label><input type="text" class="form-control" id="t-title" placeholder="Describe the task…"></div>
            <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="t-desc" rows="2"></textarea></div>
            <div class="grid-2">
                <div class="form-group"><label class="form-label">Status</label>
                    <select class="form-control" id="t-status">
                        <option value="todo">To Do</option>
                        <option value="in-progress">In Progress</option>
                        <option value="review">Review</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Priority</label>
                    <select class="form-control" id="t-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label class="form-label">Assign To</label><select class="form-control" id="t-assign"><option value="">Unassigned</option></select></div>
                <div class="form-group"><label class="form-label">Milestone</label><select class="form-control" id="t-milestone"><option value="">None</option></select></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label class="form-label">Due Date</label><input type="date" class="form-control" id="t-due"></div>
                <div class="form-group"><label class="form-label">Estimated Hours</label><input type="number" class="form-control" id="t-hours" min="0" step="0.5" value="0"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('create-task-modal')">Cancel</button>
            <button class="btn btn-primary" id="create-task-btn" onclick="createTask()">Add Task</button>
        </div>
    </div>
</div>

<!-- Edit Project Modal -->
<div class="modal-overlay" id="edit-project-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Edit Project</span>
            <button class="modal-close" onclick="closeModal('edit-project-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Title *</label><input type="text" class="form-control" id="ep-title"></div>
            <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="ep-desc" rows="3"></textarea></div>
            <div class="grid-2">
                <div class="form-group"><label class="form-label">Status</label>
                    <select class="form-control" id="ep-status">
                        <option value="active">Active</option>
                        <option value="on-hold">On Hold</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Priority</label>
                    <select class="form-control" id="ep-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-control" id="ep-start"></div>
                <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-control" id="ep-end"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-danger" onclick="deleteProject()">Delete Project</button>
            <button class="btn btn-secondary" onclick="closeModal('edit-project-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="updateProject()">Save Changes</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
Auth.requireAuth();
document.getElementById('sidebar-wrap').innerHTML = renderSidebar('projects');
document.getElementById('user-card-btn')?.addEventListener('click', () => { Auth.clear(); window.location.href='index.html'; });

const params    = new URLSearchParams(location.search);
const projectId = params.get('id');
if (!projectId) window.location.href = 'projects.html';

let project   = null;
let allTasks  = [];
let allUsers  = [];

function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
        const names = ['milestones','tasks','members','overview'];
        b.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
}

async function loadProject() {
    try {
        [project, allTasks, allUsers] = await Promise.all([
            GET(`/projects/${projectId}`),
            GET(`/tasks?project_id=${projectId}`),
            GET('/users')
        ]);

        document.title = `${project.title} — TaskFlow`;
        document.getElementById('topbar-project-name').textContent = project.title;

        renderHero();
        renderMilestones();
        renderTasksTable();
        renderMembers();
        renderOverview();
        populateTaskForm();
    } catch (err) {
        toast('Error', 'Failed to load project', 'error');
    }
}

function renderHero() {
    const totalTasks = allTasks.length;
    const doneTasks  = allTasks.filter(t => t.status === 'done').length;
    const pct        = calcProgress(doneTasks, totalTasks);
    const msTotal    = project.milestones.length;
    const msDone     = project.milestones.filter(m => m.status === 'completed').length;

    document.getElementById('project-hero').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
            <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                    <h1 class="project-hero-title">${project.title}</h1>
                    ${statusBadge(project.status)}
                    ${priorityBadge(project.priority)}
                </div>
                ${project.description ? `<p class="project-hero-desc">${project.description}</p>` : ''}
                <div class="project-hero-meta">
                    <div class="meta-item"><span class="meta-label">Owner</span><span class="meta-value">${project.owner_name}</span></div>
                    <div class="meta-item"><span class="meta-label">Start Date</span><span class="meta-value">${formatDate(project.start_date)}</span></div>
                    <div class="meta-item"><span class="meta-label">End Date</span><span class="meta-value">${formatDate(project.end_date)}</span></div>
                    <div class="meta-item"><span class="meta-label">Milestones</span><span class="meta-value">${msDone} / ${msTotal}</span></div>
                    <div class="meta-item"><span class="meta-label">Team Size</span><span class="meta-value">${project.members.length} members</span></div>
                </div>
            </div>
            <div style="min-width:200px;flex:0 0 200px">
                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em">Overall Progress</div>
                <div style="font-size:2rem;font-weight:700;margin-bottom:6px">${pct}%</div>
                ${progressBar(pct)}
                <div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px">${doneTasks} of ${totalTasks} tasks completed</div>
            </div>
        </div>
    `;
}

function renderMilestones() {
    const list = document.getElementById('milestone-list');
    if (!project.milestones.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏁</div><div class="empty-title">No milestones yet</div><div class="empty-desc">Break your project into milestones to track progress.</div></div>`;
        return;
    }
    list.innerHTML = project.milestones.map(m => {
        const pct = calcProgress(m.done_count, m.task_count);
        return `
            <div class="milestone-item">
                <div class="milestone-dot-wrap">
                    <div class="milestone-dot ${m.status}">
                        ${m.status === 'completed' ? '✓' : ''}
                    </div>
                    <div class="milestone-line"></div>
                </div>
                <div class="milestone-content">
                    <div class="milestone-header">
                        <span class="milestone-title">${m.title}</span>
                        <div style="display:flex;align-items:center;gap:8px">
                            ${statusBadge(m.status)}
                            <select class="form-control" style="width:auto;padding:3px 8px;font-size:0.75rem" data-mid="${m.id}" onchange="updateMilestoneStatus(this.dataset.mid, this.value)">
                                <option value="pending"     ${m.status==='pending'?'selected':''}>Pending</option>
                                <option value="in-progress" ${m.status==='in-progress'?'selected':''}>In Progress</option>
                                <option value="completed"   ${m.status==='completed'?'selected':''}>Completed</option>
                            </select>
                        </div>
                    </div>
                    <div class="milestone-meta">
                        ${m.description ? m.description + ' · ' : ''}
                        Due: ${formatDate(m.due_date)} · ${m.task_count} tasks
                    </div>
                    <div class="milestone-progress-wrap">
                        ${progressBar(pct)}
                        <div style="font-size:0.7rem;color:var(--text-muted);margin-top:3px">${m.done_count}/${m.task_count} tasks done</div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function renderTasksTable() {
    const statusF   = document.getElementById('task-status-filter').value;
    const priorityF = document.getElementById('task-priority-filter').value;
    const search    = document.getElementById('task-search').value.toLowerCase();

    let filtered = allTasks;
    if (statusF)   filtered = filtered.filter(t => t.status === statusF);
    if (priorityF) filtered = filtered.filter(t => t.priority === priorityF);
    if (search)    filtered = filtered.filter(t => t.title.toLowerCase().includes(search));

    const tbody = document.getElementById('tasks-tbody');
    if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">No tasks found</td></tr>`;
        return;
    }
    tbody.innerHTML = filtered.map(t => `
        <tr>
            <td>
                <div style="font-weight:600;max-width:250px">${t.title}</div>
                ${t.description ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px">${t.description}</div>` : ''}
            </td>
            <td><span class="text-sm text-muted">${t.milestone_title || '—'}</span></td>
            <td>
                <select style="background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:0.78rem;padding:3px 6px;cursor:pointer" onchange="quickStatusChange(${t.id},this.value)">
                    <option value="todo"        ${t.status==='todo'?'selected':''}>To Do</option>
                    <option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option>
                    <option value="review"      ${t.status==='review'?'selected':''}>Review</option>
                    <option value="done"        ${t.status==='done'?'selected':''}>Done</option>
                </select>
            </td>
            <td>${priorityBadge(t.priority)}</td>
            <td>
                ${t.assigned_name
                    ? `<div style="display:flex;align-items:center;gap:6px">${avatarEl(t.assigned_name,24)}<span class="text-sm">${t.assigned_name}</span></div>`
                    : '<span class="text-sm text-muted">Unassigned</span>'}
            </td>
            <td>
                <span class="${isOverdue(t.due_date) && t.status!=='done' ? 'text-xs' : 'text-xs text-muted'}" style="${isOverdue(t.due_date) && t.status!=='done' ? 'color:var(--red)' : ''}">
                    ${formatDate(t.due_date)}
                </span>
            </td>
            <td>
                <button class="btn btn-ghost btn-sm" onclick="deleteTask(${t.id})">🗑</button>
            </td>
        </tr>
    `).join('');
}

function renderMembers() {
    document.getElementById('members-list').innerHTML = project.members.map(m => `
        <div class="member-item">
            ${avatarEl(m.name, 36)}
            <div>
                <div style="font-weight:600;font-size:0.88rem">${m.name}</div>
                <div style="font-size:0.75rem;color:var(--text-muted)">${m.email}</div>
            </div>
            <span class="member-role-badge">${m.project_role}</span>
        </div>
    `).join('');
}

function renderOverview() {
    const byStatus = ['todo','in-progress','review','done'].map(s => ({
        status: s,
        count: allTasks.filter(t => t.status === s).length
    }));
    const colors = { 'todo':'#7d8fa8','in-progress':'#3b82f6','review':'#a855f7','done':'#22c55e' };
    document.getElementById('overview-status').innerHTML = byStatus.map(s => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)">
            <div style="width:10px;height:10px;border-radius:50%;background:${colors[s.status]};flex-shrink:0"></div>
            <span style="flex:1;font-size:0.85rem;text-transform:capitalize">${s.status.replace('-',' ')}</span>
            <strong style="font-family:'JetBrains Mono',monospace;font-size:0.85rem">${s.count}</strong>
            ${progressBar(calcProgress(s.count, allTasks.length || 1))}
        </div>
    `).join('');

    document.getElementById('overview-milestones').innerHTML = project.milestones.map(m => `
        <div style="padding:8px 0;border-bottom:1px solid var(--border-light)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
                <span style="font-size:0.85rem;font-weight:600">${m.title}</span>
                ${statusBadge(m.status)}
            </div>
            ${progressBar(calcProgress(m.done_count, m.task_count))}
        </div>
    `).join('');
}

function populateTaskForm() {
    const assignSel = document.getElementById('t-assign');
    assignSel.innerHTML = '<option value="">Unassigned</option>' +
        allUsers.map(u => `<option value="${u.id}">${u.name}</option>`).join('');

    const msSel = document.getElementById('t-milestone');
    msSel.innerHTML = '<option value="">None</option>' +
        project.milestones.map(m => `<option value="${m.id}">${m.title}</option>`).join('');
}

async function quickStatusChange(taskId, status) {
    try {
        await PATCH(`/tasks/${taskId}/status`, { status });
        const task = allTasks.find(t => t.id === taskId);
        if (task) task.status = status;
        renderHero();
        renderTasksTable();
        toast('Updated', 'Task status changed', 'success');
    } catch (err) {
        toast('Error', err.message, 'error');
    }
}

async function createMilestone() {
    const title = document.getElementById('ms-title').value.trim();
    if (!title) { toast('Validation', 'Title is required', 'warning'); return; }
    try {
        await POST(`/projects/${projectId}/milestones`, {
            title,
            description: document.getElementById('ms-desc').value,
            due_date:    document.getElementById('ms-due').value
        });
        closeModal('create-milestone-modal');
        toast('Success', 'Milestone added', 'success');
        await loadProject();
    } catch (err) { toast('Error', err.message, 'error'); }
}

async function updateMilestoneStatus(id, status) {
    try {
        await PUT(`/projects/${projectId}/milestones/${id}`, { status });
        toast('Updated', 'Milestone status updated', 'success');
        await loadProject();
    } catch (err) { toast('Error', err.message, 'error'); }
}

async function createTask() {
    const title = document.getElementById('t-title').value.trim();
    if (!title) { toast('Validation', 'Task title is required', 'warning'); return; }
    const btn = document.getElementById('create-task-btn');
    btn.disabled = true; btn.textContent = 'Adding…';
    try {
        await POST('/tasks', {
            project_id:    projectId,
            milestone_id:  document.getElementById('t-milestone').value || null,
            title,
            description:   document.getElementById('t-desc').value,
            status:        document.getElementById('t-status').value,
            priority:      document.getElementById('t-priority').value,
            assigned_to:   document.getElementById('t-assign').value || null,
            due_date:      document.getElementById('t-due').value,
            estimated_hrs: parseFloat(document.getElementById('t-hours').value) || 0
        });
        closeModal('create-task-modal');
        toast('Success', `Task "${title}" created`, 'success');
        document.getElementById('t-title').value = '';
        document.getElementById('t-desc').value = '';
        await loadProject();
    } catch (err) { toast('Error', err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Add Task'; }
}

async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
        await DELETE(`/tasks/${id}`);
        allTasks = allTasks.filter(t => t.id !== id);
        renderHero();
        renderTasksTable();
        toast('Deleted', 'Task removed', 'success');
    } catch (err) { toast('Error', err.message, 'error'); }
}

// Edit project form population
function openEditProjectModal() {
    if (!project) return;
    document.getElementById('ep-title').value    = project.title;
    document.getElementById('ep-desc').value     = project.description || '';
    document.getElementById('ep-status').value   = project.status;
    document.getElementById('ep-priority').value = project.priority;
    document.getElementById('ep-start').value    = project.start_date || '';
    document.getElementById('ep-end').value      = project.end_date || '';
    openModal('edit-project-modal');
}

async function updateProject() {
    try {
        await PUT(`/projects/${projectId}`, {
            title:       document.getElementById('ep-title').value,
            description: document.getElementById('ep-desc').value,
            status:      document.getElementById('ep-status').value,
            priority:    document.getElementById('ep-priority').value,
            start_date:  document.getElementById('ep-start').value,
            end_date:    document.getElementById('ep-end').value
        });
        closeModal('edit-project-modal');
        toast('Saved', 'Project updated successfully', 'success');
        await loadProject();
    } catch (err) { toast('Error', err.message, 'error'); }
}

async function deleteProject() {
    if (!confirm('Are you sure you want to delete this project? This will delete all tasks and milestones.')) return;
    try {
        await DELETE(`/projects/${projectId}`);
        toast('Deleted', 'Project deleted', 'success');
        setTimeout(() => window.location.href = 'projects.html', 600);
    } catch (err) { toast('Error', err.message, 'error'); }
}

loadProject();
</script>
